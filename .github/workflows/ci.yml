name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Import smoke test
        run: |
          python - <<'PY'
          import onii_pulumi_modules.storage
          import onii_pulumi_modules.messaging
          import onii_pulumi_modules.database
          import onii_pulumi_modules.network
          import onii_pulumi_modules.iam
          import onii_pulumi_modules.compute
          import onii_pulumi_modules.scaling
          import onii_pulumi_modules.events
          import onii_pulumi_modules.notifications
          print("ok")
          PY
      - name: Build package
        run: |
          pip install build
          python -m build
